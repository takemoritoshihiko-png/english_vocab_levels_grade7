<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英単語トレーナー — Level 1 & 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F2F7FB;--card:#FFFFFF;--ink:#1F2A44;--muted:#6B7A99;--primary:#FF6B4A;--primary-dk:#d8472b;
    --formal:#2563EB;--formal-soft:#DBEAFE;
    --neutral:#16A34A;--neutral-soft:#DCFCE7;
    --lv1:#0E9F9A;--lv2:#F97316;--lv3:#8B5CF6;
    --shadow:0 8px 24px rgba(31,42,68,.10);--shadow-lg:0 16px 40px rgba(31,42,68,.16);
    --display:'Fredoka',system-ui,sans-serif;--body:'Nunito Sans',system-ui,sans-serif;
  }
  body.lv2{--paper:#FFF4E8;--primary:#F97316;--primary-dk:#c2570c}
  body.lv3{--paper:#F5F0FF;--primary:#8B5CF6;--primary-dk:#6d28d9}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;padding:18px 14px 60px;transition:background .3s}
  .wrap{max-width:760px;margin:0 auto}
  header{text-align:center;margin-bottom:14px}
  .logo{font-family:var(--display);font-weight:700;font-size:30px}
  .logo .q{color:var(--primary)}
  .sub{color:var(--muted);font-weight:600;font-size:14px;margin-top:2px}

  .lvswitch{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:14px 0}
  .lvbtn{font-family:var(--display);font-weight:600;font-size:15px;border:2px solid #D7E2EC;background:#fff;color:var(--muted);padding:9px 22px;border-radius:30px;cursor:pointer;transition:all .15s}
  .lvbtn[data-level="1"].active{background:var(--lv1);border-color:var(--lv1);color:#fff}
  .lvbtn[data-level="2"].active{background:var(--lv2);border-color:var(--lv2);color:#fff}
  .lvbtn[data-level="3"].active{background:var(--lv3);border-color:var(--lv3);color:#fff}
  .lvbtn[data-level="4"].active{background:#7c3aed;border-color:#7c3aed;color:#fff}

  .legend{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
  .leg{display:flex;align-items:center;gap:7px;background:var(--card);border-radius:14px;padding:7px 12px;box-shadow:var(--shadow);font-size:12px;font-weight:700;color:var(--muted)}
  .dot{width:11px;height:11px;border-radius:50%}
  .dot.formal{background:var(--formal)}.dot.neutral{background:var(--neutral)}

  .tabs{display:flex;flex-wrap:wrap;gap:4px;background:rgba(0,0,0,.06);padding:5px;border-radius:18px;margin:0 auto 16px;max-width:560px}
  .tab{flex:1 1 auto;min-width:62px;border:none;background:transparent;cursor:pointer;font-family:var(--display);font-weight:600;font-size:13px;color:var(--muted);padding:10px 2px;border-radius:13px;transition:all .18s}
  .tab.active{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}

  .list-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
  .count{font-family:var(--display);font-weight:700;font-size:14px;color:var(--ink)}
  .count b{color:var(--primary);font-size:17px}
  .filters{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
  .chip{border:2px solid #D7E2EC;background:var(--card);cursor:pointer;font-family:var(--display);font-weight:600;font-size:13px;padding:6px 14px;border-radius:20px;color:var(--muted);transition:all .15s}
  .chip.on{background:var(--ink);border-color:var(--ink);color:#fff}

  .grid{display:grid;gap:11px}
  .word-card{background:var(--card);border-radius:16px;padding:14px 15px;box-shadow:var(--shadow);display:flex;gap:13px;align-items:flex-start;border-left:6px solid var(--neutral);transition:opacity .2s,background .2s}
  .word-card.formal{border-left-color:var(--formal)}
  .word-card.learned{background:#F2FBF5;opacity:.74}
  .emoji{font-size:34px;width:42px;text-align:center;flex-shrink:0}
  .wc-body{flex:1;min-width:0}
  .wc-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .wc-word{font-family:var(--display);font-weight:700;font-size:20px}
  .badge{font-size:10px;font-weight:800;letter-spacing:.4px;padding:3px 8px;border-radius:8px}
  .badge.formal{color:var(--formal);background:var(--formal-soft)}
  .badge.neutral{color:var(--neutral);background:var(--neutral-soft)}
  .wc-ipa{color:var(--muted);font-size:12px;font-weight:600}
  .wc-mean{font-weight:700;font-size:14px;margin-top:3px}
  .wc-ex{font-size:13px;margin-top:5px}
  .wc-ex b{color:var(--primary)}
  .wc-ex .ja{display:block;color:var(--muted);font-size:12px;font-weight:600;margin-top:1px}
  .card-actions{display:flex;flex-direction:column;gap:8px;align-items:center;flex-shrink:0}
  .speak{width:40px;height:40px;border-radius:50%;border:none;background:var(--paper);cursor:pointer;font-size:17px;line-height:1;box-shadow:var(--shadow);transition:transform .12s}
  .speak:active{transform:scale(.88)}
  .mark{border:2px solid var(--neutral);background:#fff;color:var(--neutral);font-family:var(--display);font-weight:700;font-size:12px;padding:6px 9px;border-radius:13px;cursor:pointer;white-space:nowrap;min-width:54px;transition:all .12s}
  .mark.on{background:var(--neutral);color:#fff}

  .btn{font-family:var(--display);font-weight:600;font-size:15px;border:none;cursor:pointer;padding:11px 20px;border-radius:14px;transition:transform .12s}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 0 var(--primary-dk)}
  .btn-ghost{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
  .btn-sm{padding:9px 15px;font-size:14px}

  .q-head{display:flex;justify-content:space-between;font-weight:800;color:var(--muted);font-size:14px;margin-bottom:8px}
  .q-bar{height:8px;background:rgba(0,0,0,.08);border-radius:10px;overflow:hidden;margin-bottom:16px}
  .q-bar i{display:block;height:100%;background:var(--primary);width:0;transition:width .3s}
  .q-card{background:var(--card);border-radius:22px;box-shadow:var(--shadow-lg);padding:24px 20px}
  .q-emoji{font-size:48px;text-align:center}
  .q-en{font-family:var(--display);font-weight:700;font-size:30px;text-align:center}
  .q-speak-row{text-align:center;margin-top:8px}
  .speak-wide{display:inline-block;border-radius:20px;padding:7px 16px;font-size:13px;font-family:var(--display);font-weight:600;color:var(--ink);background:var(--paper);border:none;cursor:pointer;box-shadow:var(--shadow)}
  .q-q{text-align:center;font-family:var(--display);font-weight:600;font-size:17px;margin:14px 0}
  .opts{display:grid;gap:10px}
  .opt{font-family:var(--display);font-weight:600;font-size:15px;text-align:center;background:var(--paper);border:2px solid transparent;cursor:pointer;padding:13px 10px;border-radius:14px;color:var(--ink);transition:all .15s;line-height:1.2}
  .opt:hover:not(:disabled){border-color:var(--ink)}
  .opt:disabled{cursor:default}
  .opt.correct{background:var(--neutral-soft);border-color:var(--neutral);color:#15803D}
  .opt.wrong{background:#FEE2E2;border-color:#DC2626;color:#B91C1C}
  .feedback{text-align:center;font-weight:800;font-size:14px;min-height:42px;margin-top:14px;line-height:1.45}
  .feedback.ok{color:var(--neutral)}.feedback.ng{color:#DC2626}
  .feedback .why{display:block;color:var(--ink);font-weight:700;font-size:13px;margin-top:3px}
  .result{text-align:center;background:var(--card);border-radius:24px;box-shadow:var(--shadow-lg);padding:34px 24px}
  .result .big{font-size:64px}.result h2{font-family:var(--display);font-size:26px;margin:6px 0}
  .result .score{font-family:var(--display);font-size:42px;color:var(--primary)}
  .result p{color:var(--muted);font-weight:700;margin:6px 0 20px;line-height:1.5}

  .empty{text-align:center;color:var(--muted);font-weight:700;background:var(--card);border-radius:18px;padding:40px 24px;box-shadow:var(--shadow);line-height:1.7}
  .empty .big{font-size:46px;display:block;margin-bottom:8px}
  .rev-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
  .rev-count{font-family:var(--display);font-weight:700;font-size:15px;color:var(--ink)}
  .rev-count b{color:var(--primary);font-size:18px}
  .coins{display:inline-flex;align-items:center;gap:6px;background:#FEF3C7;color:#92400E;font-family:var(--display);font-weight:700;font-size:15px;padding:6px 14px;border-radius:20px;box-shadow:var(--shadow);margin-top:10px}
  .earned{font-family:var(--display);font-weight:700;color:#B45309;font-size:16px;margin-bottom:16px;min-height:20px}
  .shop-bal{text-align:center;font-family:var(--display);font-weight:700;font-size:17px;margin-bottom:4px}
  .shop-bal b{color:#B45309;font-size:22px}
  .shop-note{text-align:center;color:var(--muted);font-weight:700;font-size:12px;margin-bottom:14px}
  .shop-h{font-family:var(--display);font-weight:700;font-size:16px;margin:16px 0 10px}
  .shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .shop-item{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:12px;text-align:center}
  .shop-prev{height:54px;border-radius:12px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--paper)}
  .mini-card{background:#fff;border-radius:10px;padding:6px 14px;font-family:var(--display);font-weight:700;color:var(--ink);box-shadow:var(--shadow);border-left:5px solid var(--formal)}
  .shop-name{font-family:var(--display);font-weight:600;font-size:14px}
  .shop-buy{margin-top:8px;width:100%;font-family:var(--display);font-weight:700;font-size:13px;border:none;border-radius:12px;padding:9px;cursor:pointer;transition:all .12s}
  .shop-buy.buy{background:#FDE68A;color:#92400E}
  .shop-buy.buy:disabled{background:#e8e8e8;color:#b0b0b0;cursor:not-allowed}
  .shop-buy.use{background:#fff;color:var(--ink);border:2px solid #cbd5e1}
  .shop-buy.using{background:var(--neutral);color:#fff;cursor:default}
  .f-rounded{border-radius:26px !important}
  .f-shadow{box-shadow:var(--shadow-lg) !important}
  .f-gold{box-shadow:0 0 0 3px #FBBF24,var(--shadow) !important}
  .f-neon{box-shadow:0 0 0 2px var(--primary),0 0 15px rgba(139,92,246,.55) !important}
  .fight{border:none;background:var(--primary);color:#fff;font-family:var(--display);font-weight:700;font-size:12px;padding:6px 9px;border-radius:13px;cursor:pointer;white-space:nowrap;min-width:54px;box-shadow:0 3px 0 var(--primary-dk)}
  .fight:active{transform:translateY(1px)}
  /* battle */
  .overlay{position:fixed;inset:0;background:rgba(14,18,34,.99);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;padding:10px;z-index:50}
  .battle{background:var(--card);border-radius:22px;box-shadow:var(--shadow-lg);width:100%;max-width:600px;max-height:96vh;overflow:auto;padding:22px}
  .bt-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .bt-top .ttl{font-family:var(--display);font-weight:700;font-size:16px}
  .bt-close{border:none;background:var(--paper);width:34px;height:34px;border-radius:50%;font-size:15px;cursor:pointer}
  .bt-enemy{text-align:center;margin:4px 0 10px}
  .bt-enemy .mon{font-size:72px;line-height:1}
  .bt-enemy .nm{font-family:var(--display);font-weight:700;font-size:16px;margin-top:2px}
  .bt-enemy .nm small{color:var(--muted);font-size:12px;display:block;font-weight:700}
  .bt-hpwrap{height:12px;background:#E3ECF3;border-radius:8px;overflow:hidden;margin:8px auto 0;max-width:260px}
  .bt-hpwrap i{display:block;height:100%;background:linear-gradient(90deg,#F87171,#EF4444);width:100%;transition:width .3s}
  .bt-meta{display:flex;justify-content:space-between;font-weight:800;color:var(--muted);font-size:13px;margin:10px 0 6px}
  .bt-q{text-align:center;font-family:var(--display);font-weight:600;font-size:18px}
  .bt-show{text-align:center;font-family:var(--display);font-weight:700;font-size:28px;margin:6px 0 14px}
  .bt-show.small{font-size:20px}
  .bt-opts{display:grid;gap:10px}
  .bt-opt{font-family:var(--display);font-weight:600;font-size:16px;text-align:center;background:#fff;border:2px solid transparent;cursor:pointer;padding:15px;border-radius:13px;color:var(--ink);box-shadow:var(--shadow)}
  .bt-opt:hover:not(:disabled){border-color:var(--ink)}
  .bt-opt:disabled{cursor:default}
  .bt-opt.correct{background:var(--neutral-soft);border-color:var(--neutral);color:#15803D}
  .bt-opt.wrong{background:#FEE2E2;border-color:#DC2626;color:#B91C1C}
  .tile-answer{min-height:48px;border:2px dashed #94a3b8;border-radius:12px;display:flex;flex-wrap:wrap;gap:4px;justify-content:center;align-items:center;padding:8px;margin-bottom:10px;font-family:var(--display);font-weight:700;font-size:26px;letter-spacing:2px;color:var(--ink);background:rgba(255,255,255,.6)}
  .tiles{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:8px}
  .tile{min-width:44px;height:50px;border:none;border-radius:10px;background:#fff;font-family:var(--display);font-weight:700;font-size:22px;cursor:pointer;box-shadow:var(--shadow)}
  .tile:disabled{opacity:.28}
  .tile-ctrl{display:flex;gap:8px;justify-content:center}
  .bt-fb{text-align:center;font-weight:800;min-height:24px;margin-top:10px}
  .bt-fb.ok{color:var(--neutral)}.bt-fb.ng{color:#DC2626}
  .bt-char{display:flex;align-items:center;gap:7px;justify-content:center;margin-top:14px;color:var(--muted);font-weight:700;font-size:12px}
  .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;background-position:center}
  .bt-result{text-align:center}
  .bt-result .big{font-size:60px}
  .bt-result h2{font-family:var(--display);font-size:26px;margin:6px 0}
  .bt-result .rw{font-family:var(--display);font-weight:700;color:#B45309;font-size:16px;margin:8px 0 16px}
  /* gacha */
  .gacha-top{text-align:center;margin-bottom:14px}
  .gacha-btn{font-family:var(--display);font-weight:700;font-size:17px;border:none;border-radius:16px;padding:14px 28px;cursor:pointer;background:linear-gradient(135deg,#8B5CF6,#EC4899);color:#fff;box-shadow:0 5px 0 #6d28d9}
  .gacha-btn:active{transform:translateY(2px);box-shadow:0 3px 0 #6d28d9}
  .gacha-btn:disabled{background:#cbd5e1;box-shadow:0 5px 0 #94a3b8;cursor:not-allowed}
  .gacha-cost{color:var(--muted);font-weight:700;font-size:13px;margin-top:8px}
  .char-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .char{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:12px;text-align:center;border:2px solid transparent}
  .char.active{border-color:var(--neutral)}
  .char.locked{opacity:.6}
  .char .av{width:56px;height:56px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;background-position:center;background-size:cover}
  .char .cn{font-family:var(--display);font-weight:700;font-size:13px}
  .char .rr{font-family:var(--display);font-weight:800;font-size:11px;padding:1px 8px;border-radius:10px;display:inline-block;margin-top:3px}
  .char .perk{font-size:11px;color:var(--muted);font-weight:700;margin-top:4px;line-height:1.3}
  .char .use{margin-top:7px;width:100%;border:none;border-radius:10px;padding:7px;font-family:var(--display);font-weight:700;font-size:12px;cursor:pointer;background:var(--paper);color:var(--ink)}
  .char.active .use{background:var(--neutral);color:#fff;cursor:default}
  .rr.N{background:#e5e7eb;color:#4b5563}.rr.R{background:#DBEAFE;color:#1d4ed8}
  .rr.SR{background:#EDE9FE;color:#7c3aed}.rr.SSR{background:#FEF3C7;color:#b45309}
  .pull-pop{text-align:center;padding:12px 0}
  .pull-pop .av{width:80px;height:80px;border-radius:50%;margin:8px auto;display:flex;align-items:center;justify-content:center;font-size:40px;color:#fff;background-size:cover;background-position:center;animation:pop .4s}
  .pull-pop .cn{font-family:var(--display);font-weight:700;font-size:15px}
  @keyframes pop{0%{transform:scale(.3);opacity:0}100%{transform:scale(1);opacity:1}}
  .hpbar{position:relative;height:16px;background:#E3ECF3;border-radius:8px;overflow:hidden;margin-top:4px}
  .hpbar i{display:block;height:100%;transition:width .35s}
  .hpbar.enemy i{background:linear-gradient(90deg,#F87171,#EF4444)}
  .hpbar.ally i{background:linear-gradient(90deg,#34D399,#10B981)}
  .hpbar span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#1f2a44}
  .bt-you{display:flex;align-items:center;gap:12px;margin:14px 0 2px}
  .avatar-lg{width:66px;height:66px;border-radius:16px;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:34px;color:#fff;background-color:#8B5CF6;flex-shrink:0}
  .you-info{flex:1;min-width:0}
  .you-name{font-family:var(--display);font-weight:700;font-size:15px}
  .team-dots{display:flex;gap:8px;justify-content:center;margin:12px 0 2px}
  .tdot{width:40px;height:40px;border-radius:50%;border:2px solid #cbd5e1;overflow:hidden}
  .tdot.cur{border-color:var(--neutral);border-width:3px}
  .tdot.dead{opacity:.3;filter:grayscale(1)}
  .tav{width:100%;height:100%;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;background-color:#8B5CF6}
  .bt-log{text-align:center;font-family:var(--display);font-weight:600;font-size:14px;color:var(--muted);margin:10px 0}
  .move-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .move{border:none;border-radius:13px;padding:12px 10px;cursor:pointer;text-align:center;box-shadow:var(--shadow);background:#fff;display:flex;flex-direction:column;gap:2px}
  .move .mn{font-family:var(--display);font-weight:700;font-size:14px}
  .move .mc{font-size:11px;font-weight:800}
  .move.phys{border-top:4px solid #EF4444}.move.phys .mc{color:#EF4444}
  .move.spec{border-top:4px solid #3B82F6}.move.spec .mc{color:#3B82F6}
  .move.stat{border-top:4px solid #64748B}.move.stat .mc{color:#64748B}
  .move:active{transform:translateY(1px)}
  .char .cstats{font-size:10px;color:var(--muted);font-weight:700;margin-top:3px}
  .stagerow{font-size:11px;font-weight:800;color:#7c3aed;margin-top:3px;min-height:14px;text-align:center}
  .sfxbtn{background:rgba(255,255,255,.25);border:none;border-radius:10px;font-size:18px;padding:4px 8px;cursor:pointer;line-height:1;margin-left:6px}
  .sfxbtn.off{opacity:.45}
  .speech-note{position:fixed;left:50%;transform:translateX(-50%);top:10px;max-width:min(92vw,560px);z-index:9999;background:#fff;border:2px solid var(--primary);border-radius:14px;padding:12px 40px 12px 14px;font-size:13px;line-height:1.55;color:var(--ink);box-shadow:0 8px 30px rgba(0,0,0,.18)}
  .speech-note .note-x{position:absolute;top:6px;right:8px;border:none;background:transparent;font-size:16px;cursor:pointer;color:#999;line-height:1}
  .team-slots{display:flex;flex-direction:column;gap:8px;margin:10px 0 4px}
  .tslot{display:flex;align-items:center;gap:10px;background:var(--paper);border-radius:14px;padding:8px 10px;box-shadow:var(--shadow)}
  .tslot.empty{background:transparent;border:2px dashed #d3d8e0;box-shadow:none}
  .tslot-no{flex:none;width:26px;height:26px;border-radius:50%;background:#eef0f4;color:var(--primary);font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .tslot .tav{flex:none;width:42px;height:42px;border-radius:50%}
  .tslot-name{flex:1;min-width:0;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tslot-name .lead{font-size:10px;background:var(--primary);color:#fff;border-radius:6px;padding:1px 5px;margin-left:5px;font-weight:800}
  .tslot-empty{flex:1;font-size:13px;color:var(--muted);font-weight:700}
  .tslot-ctrl{flex:none;display:flex;gap:4px}
  .tmini{border:none;background:#eef0f4;border-radius:8px;font-size:14px;font-weight:800;padding:5px 9px;cursor:pointer;line-height:1}
  .tmini:disabled{opacity:.3;cursor:default}

/* ---- sound effects (Web Audio, no files) ---- */
let sfxOn=true, actx=null;
function ac(){ if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}} if(actx.state==='suspended')actx.resume(); return actx; }
function beep(freq,dur,type,vol,delay,slideTo){
  if(!sfxOn)return; const c=ac(); if(!c)return;
  const t0=c.currentTime+(delay||0);
  const o=c.createOscillator(), g=c.createGain();
  o.type=type||'square'; o.frequency.setValueAtTime(freq,t0);
  if(slideTo)o.frequency.exponentialRampToValueAtTime(slideTo,t0+dur);
  const v=(vol==null?0.14:vol);
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(v,t0+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g).connect(c.destination); o.start(t0); o.stop(t0+dur+0.02);
}
function noise(dur,vol,delay){
  if(!sfxOn)return; const c=ac(); if(!c)return;
  const t0=c.currentTime+(delay||0), n=Math.floor(c.sampleRate*dur);
  const buf=c.createBuffer(1,n,c.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
  const s=c.createBufferSource(); s.buffer=buf;
  const g=c.createGain(); g.gain.setValueAtTime(vol==null?0.12:vol,t0); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  s.connect(g).connect(c.destination); s.start(t0);
}

/* ---- 発音 ---- */
let enVoice=null, hintedNoSpeech=false;
const inFrame=(function(){try{return window.self!==window.top;}catch(e){return true;}})();
// 確実に鳴る音声を優先し、未DLで無音になるSiri系(Aaron/Nicky等)を避ける
const GOOD_VOICES=['Samantha','Alex','Victoria','Google US English','Microsoft Zira','Microsoft David','Microsoft Mark','Karen','Moira','Tessa','Daniel','Google UK English'];
const BAD_VOICES=['Aaron','Nicky'];
function loadVoices(){
  const vs=speechSynthesis.getVoices();
  const en=vs.filter(v=>/^en/i.test(v.lang));
  // ★Chromeは端末内蔵(local)音声だと「イベントは出るが無音」の個体がある。
  //   ブラウザ自身の音の出口を通るネットワーク音声(Google等)を最優先にする。
  let pick = en.find(v=>!v.localService && /en[-_]?US/i.test(v.lang))
          || en.find(v=>!v.localService);
  if(!pick){ for(const nm of GOOD_VOICES){ pick=en.find(v=>v.name.indexOf(nm)===0); if(pick)break; } }
  enVoice = pick
    || en.find(v=>v.localService&&BAD_VOICES.indexOf(v.name)<0&&/en[-_]?US/i.test(v.lang))
    || en.find(v=>v.default)
    || en[0] || null;
}
if('speechSynthesis' in window){loadVoices();speechSynthesis.addEventListener('voiceschanged',loadVoices);}
function hintNoSpeech(){
  if(hintedNoSpeech)return;hintedNoSpeech=true;
  const nv=('speechSynthesis' in window)?speechSynthesis.getVoices().length:0;
  let msg;
  if(inFrame){
    msg='🔈 今この画面は <b>チャットの中（プレビュー）</b>で動いてるよ。だから声がブロックされてるんだ。ファイルを<b>ダウンロード→ダブルクリックで開く</b>と鳴るはず！';
  }else if(!('speechSynthesis'in window)||nv===0){
    msg='🔈 このブラウザに<b>英語の音声（ボイス）が見つからない</b>みたい。学校のパソコンだと制限されてることがあるよ。（見つかった音声：'+nv+'個）';
  }else{
    msg='🔈 声が出せなかったよ。もう一度🔊を押してみて。ダメなら Chrome か Edge で試してね。（音声：'+nv+'個）';
  }
  const n=document.createElement('div');n.className='speech-note';
  n.innerHTML=msg+' <button class="note-x" aria-label="とじる">✕</button>';
  document.body.appendChild(n);
  n.querySelector('.note-x').onclick=()=>n.remove();
  setTimeout(()=>{if(n.parentNode)n.remove();},13000);
}
function speak(t){
  duckBgm();
  // まず自前の発音ファイル(audio/xxx.m4a)を<audio>で鳴らす。これはBGMと同じ確実な音経路。
  // 万一ファイルが無ければ端末の読み上げにフォールバック。
  playWordAudio(t).catch(()=>speakLocal(t));
}
function playWordAudio(t){
  return new Promise((res,rej)=>{
    try{
      const fn=String(t).toLowerCase().replace(/[^a-z0-9]+/g,'_');
      const a=new Audio('audio/'+fn+'.m4a');
      a.volume=1;
      let done=false;
      a.addEventListener('playing',()=>{done=true;res();});
      a.addEventListener('ended',()=>{res();});
      a.addEventListener('error',()=>{if(!done)rej();});
      const p=a.play();
      if(p&&p.catch)p.catch(()=>{if(!done)rej();});
      setTimeout(()=>{if(!done)rej();},1600);
    }catch(e){rej();}
  });
}
let bgmDuckT=null;
function duckBgm(){
  const b=document.getElementById('bgm');
  if(!b||b.paused)return;
  b.volume=0.1;
  if(bgmDuckT)clearTimeout(bgmDuckT);
  bgmDuckT=setTimeout(()=>{b.volume=0.35;},2200);
}
function playOnlineVoice(t){
  return new Promise((res,rej)=>{
    try{
      const a=new Audio();
      a.src='https://api.streamelements.com/kappa/v2/speech?voice=Matthew&text='+encodeURIComponent(t);
      let ok=false;
      a.addEventListener('playing',()=>{ok=true;res();});
      a.addEventListener('error',()=>rej());
      const p=a.play();
      if(p&&p.catch)p.catch(()=>rej());
      setTimeout(()=>{if(!ok&&a.paused)rej();},2600);
    }catch(e){rej();}
  });
}
function speakLocal(t){
  if(!('speechSynthesis' in window)){hintNoSpeech();return;}
  try{
    if(!enVoice)loadVoices();
    if(speechSynthesis.speaking||speechSynthesis.pending)speechSynthesis.cancel();
    // Safari対策:ユーザー操作と同じ流れで即speakする。AudioContextには触らない。
    const mk=(useDefault)=>{const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.9;if(enVoice&&!useDefault)u.voice=enVoice;return u;};
    let started=false;
    const u=mk(false);u.onstart=()=>{started=true;};
    speechSynthesis.speak(u);
    setTimeout(()=>{
      if(started||speechSynthesis.speaking||speechSynthesis.pending)return;
      speechSynthesis.cancel();
      let s2=false;const u2=mk(true);u2.onstart=()=>{s2=true;};  // 既定の音声で再挑戦(未DL音声の無音対策)
      speechSynthesis.speak(u2);
      setTimeout(()=>{if(!s2&&!speechSynthesis.speaking&&!speechSynthesis.pending)hintNoSpeech();},1600);
    },380);
  }catch(e){hintNoSpeech();}
}

/* ---- quiz ---- */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let qs=[],qi=0,score=0,quizMode='all';
function poolFor(mode){
  if(mode==='review')return words().filter(d=>d.wrong);
  if(mode==='unlearned')return words().filter(d=>!d.learned);
  return [...words()];
}
function startQuiz(mode='all'){
  quizMode=mode;
  const pool=poolFor(mode);
  if(!pool.length){
    if(mode==='review'){switchTab('review');renderReview();return;}
    alert('対象の単語がないよ');switchTab('list');renderList();return;
  }
  qs=shuffle([...pool]).slice(0,Math.min(10,pool.length));
  qi=0;score=0;
  document.getElementById('quizResult').classList.add('hidden');
  document.getElementById('quizPlay').classList.remove('hidden');renderQ();
}
function renderQ(){
  const d=qs[qi];
  const r=Math.random();
  const kind = r<0.34 ? 'mean' : (r<0.67 ? 'word' : 'cloze');
  document.getElementById('qNum').textContent=`Q${qi+1} / ${qs.length}`;
  document.getElementById('qScore').textContent=`スコア ${score}`;
  document.getElementById('qBar').style.width=`${(qi/qs.length)*100}%`;
  document.getElementById('qEmoji').textContent=d.e;
  document.getElementById('qFb').textContent='';document.getElementById('qFb').className='feedback';
  const enEl=document.getElementById('qEn');
  const sp=document.getElementById('qSpeak');sp.onclick=()=>speak(d.w);
  const opts=document.getElementById('qOpts');opts.innerHTML='';
  const AW=allWords();   // 誤答は全レベルから(紛らわしく)
  let correct;
  if(kind==='mean'){
    enEl.textContent=d.w;enEl.style.fontSize='30px';sp.classList.remove('hidden');
    document.getElementById('qQ').textContent='意味は？';
    correct=d.mean;
    const pool=shuffle(AW.filter(x=>x.mean!==d.mean)).slice(0,5).map(x=>x.mean);
    build(opts,shuffle([correct,...pool]),correct);
  }else if(kind==='word'){
    enEl.textContent=d.mean;enEl.style.fontSize='19px';sp.classList.add('hidden');
    document.getElementById('qQ').textContent='英単語は？';
    correct=d.w;
    const pool=shuffle(AW.filter(x=>x.w!==d.w)).slice(0,5).map(x=>x.w);
    build(opts,shuffle([correct,...pool]),correct);
  }else{
    enEl.innerHTML=(d.en||d.mean).replace(/<b>.*?<\/b>/,'＿＿＿');enEl.style.fontSize='16px';sp.classList.add('hidden');
    document.getElementById('qQ').textContent='空所に入る英単語は？';
    correct=d.w;
    const pool=shuffle(AW.filter(x=>x.w!==d.w)).slice(0,5).map(x=>x.w);
    build(opts,shuffle([correct,...pool]),correct);
  }
}
function build(opts,arr,correct){
  arr.forEach(txt=>{const b=document.createElement('button');b.className='opt';b.textContent=txt;b.onclick=()=>answer(b,txt===correct,correct,opts);opts.appendChild(b);});
}
function answer(btn,ok,correct,opts){
  const d=qs[qi];
  const sp=document.getElementById('qSpeak');sp.classList.remove('hidden');sp.onclick=()=>speak(d.w);
  [...opts.children].forEach(b=>{b.disabled=true;if(b.textContent===correct)b.classList.add('correct');});
  const fb=document.getElementById('qFb');
  if(ok){
    score++;fb.className='feedback ok';
    if(quizMode==='review'){d.wrong=false;fb.innerHTML='せいかい！ 🎉<span class="why">マスター！復習リストから消したよ ✅</span>';}
    else fb.textContent='せいかい！ 🎉';
  }else{
    btn.classList.add('wrong');fb.className='feedback ng';d.wrong=true;
    fb.innerHTML='おしい！正解は緑だよ 🟢<span class="why">「❌ 復習」にためたよ</span>';
  }
  document.getElementById('qScore').textContent=`スコア ${score}`;
  setTimeout(()=>{qi++;qi<qs.length?renderQ():showResult();},1200);
}
function showResult(){
  document.getElementById('quizPlay').classList.add('hidden');
  const r=document.getElementById('quizResult');r.classList.remove('hidden');
  document.getElementById('qBar').style.width='100%';
  const p=qs.length?score/qs.length:0;let e,t,m;
  if(p===1){e='🏆';t='パーフェクト！';m=quizMode==='review'?'まちがえた単語をぜんぶマスター！':'しっかり頭に入ってるね。この調子！';}
  else if(p>=0.7){e='🎉';t='すごい！';m='かなり覚えてる。あと少しで満点。';}
  else if(p>=0.4){e='💪';t='いいペース！';m='まちがえたのは「❌ 復習」へ。そこで集中復習しよう。';}
  else{e='📖';t='ここから！';m='一覧と「❌ 復習」を見直して、もう一回！';}
  document.getElementById('rEmoji').textContent=e;
  document.getElementById('rTitle').textContent=t;
  document.getElementById('rScore').textContent=`${score} / ${qs.length}`;
  document.getElementById('rMsg').textContent=m;
  const bonus=(p===1&&qs.length>=3)?5:0;
  const earned=score+bonus;
  coins+=earned;updateCoins();
  if(p===1)sfx.win(); else if(earned>0)sfx.coin();
  document.getElementById('rEarned').textContent=`＋${earned} 🪙 ゲット！`+(bonus?`（全問正解ボーナス +${bonus}）`:'');
}

const ownedChars=new Set(['c1']);
let team=['c1'];
const GACHA_COST=300;
function getChar(id){return CHARS.find(c=>c.id===id);}
function formStat(b,key){const c=b.c;if(c&&c.forms&&c.form2&&b.hp<b.maxhp/2&&c.form2[key]!=null)return c.form2[key];return c[key];}
function avatarHTML(c,cls){return c.img?`<div class="${cls}" style="background-image:url('${c.img}')"></div>`:`<div class="${cls}" style="background:#8B5CF6">${c.emoji}</div>`;}
function doPull(){
  if(coins<GACHA_COST){alert('コインが足りないよ（300コイン必要）。クイズやバトルで貯めよう！');return;}
  const pool=CHARS.filter(c=>!ownedChars.has(c.id));
  if(pool.length===0){alert('もう全員そろってるよ！🎉');return;}
  coins-=GACHA_COST;
  sfx.gacha();
  const c=pool[Math.floor(Math.random()*pool.length)];
  ownedChars.add(c.id);

function misspell(w,n){
  const out=new Set();let tries=0;
  while(out.size<n&&tries<60){
    tries++;const a=w.split('');const t=Math.floor(Math.random()*3);
    if(t===0&&a.length>3){const i=Math.floor(Math.random()*(a.length-1));[a[i],a[i+1]]=[a[i+1],a[i]];}
    else if(t===1&&a.length>3){a.splice(Math.floor(Math.random()*a.length),1);}
    else {const i=Math.floor(Math.random()*a.length);a.splice(i,0,a[i]);}
    const m=a.join('');if(m!==w)out.add(m);
  }
  return [...out].slice(0,n);
}
function pickN(arr,key,n){return shuffle([...arr]).slice(0,n).map(key);}
function getQuestion(d){
  const others=allWords().filter(x=>x.w!==d.w);
  const kinds=['mean','rev','sent','spellmc','listen','spell'];
  const kind=kinds[Math.floor(Math.random()*kinds.length)];
  if(kind==='mean')return {kind:'mc',show:d.w,small:false,options:shuffle([d.mean,...pickN(others,x=>x.mean,3)]),answer:d.mean};
  if(kind==='rev')return {kind:'mc',show:d.mean,small:true,options:shuffle([d.w,...pickN(others,x=>x.w,3)]),answer:d.w};
  if(kind==='sent')return {kind:'mc',show:d.en.replace(/<b>.*?<\/b>/,'______'),small:true,html:true,options:shuffle([d.w,...pickN(others,x=>x.w,3)]),answer:d.w};
  if(kind==='spellmc'){let ms=misspell(d.w,3);const pad=shuffle(others).map(x=>x.w);while(ms.length<3&&pad.length){const p=pad.pop();if(p!==d.w&&!ms.includes(p))ms.push(p);}return {kind:'mc',show:d.mean,small:true,options:shuffle([d.w,...ms.slice(0,3)]),answer:d.w};}
  if(kind==='listen')return {kind:'mc',isListen:true,show:'🎧',small:false,options:shuffle([d.mean,...pickN(others,x=>x.mean,3)]),answer:d.mean};
  return {kind:'spell',show:d.mean,small:true,answer:d.w};
}

  msgs.push(playerFirst?`⚡ ${a.c.name}が先攻！`:`⚡ ${enemy.name}が先攻！`);
  let pFx=null,eFx=null;
  const pAct=()=>{ if(ok){msgs.push(performMove(a,enemy,curMove));pFx=fxInfo;fxInfo=null;} else {sfx.wrong();msgs.push(`${a.c.name}はしくじった…こうげき失敗 💥`);} };
  const eAct=()=>{ if(skipEnemy){msgs.push('🙃 先制で相手の行動を封じた！');return;} msgs.push(performMove(enemy,a,eMove));eFx=fxInfo;fxInfo=null; if(a.hp<=0)setTimeout(()=>sfx.faint(),180); };
  if(playerFirst){
    pAct();
    if(enemy.hp>0)eAct(); else msgs.push(`${enemy.name}をたおした！ 🎉`);
  }else{
    eAct();
    if(a.hp>0)pAct(); else msgs.push(`${a.c.name}はたおれて動けなかった…`);
  }
  if(playerFirst){ playFxSeq(pFx,true,0); playFxSeq(eFx,false,600); } else { playFxSeq(eFx,false,0); playFxSeq(pFx,true,600); }
  if(enemy.boss&&enemy.regen&&enemy.hp>0&&enemy.hp<enemy.maxhp){const rh=Math.max(1,Math.round(enemy.maxhp*enemy.regen));enemy.hp=Math.min(enemy.maxhp,enemy.hp+rh);msgs.push(`👑 ${enemy.name}はHPを${rh}回復した`);}
  if(a.id==='c10'&&a.hp>0){a.spaMult=(a.spaMult||1)*1.1;msgs.push('📈 クーパーの「勤勉」！特がぐんぐん上がる ▲');}
  if(a.c.forms){var nf=(a.hp<a.maxhp/2)?'dog':'ghost';if(a._form&&a._form!==nf)msgs.push(nf==='dog'?'🐕 HP半分以下！ドッグにチェンジ！攻撃がぐっと上がった':'👻 ワイトにチェンジ！素早く硬くなった');a._form=nf;}
  if(a.id==='c14'&&a.hp>0&&a.hp<a.maxhp){var hl=Math.max(1,Math.round(a.maxhp/12));a.hp=Math.min(a.maxhp,a.hp+hl);msgs.push('🏘️ カメランドの「街」！ HPが'+hl+'回復した 💚');}
  renderBattle();
  const fb=document.getElementById('btFb');
  fb.innerHTML=msgs.join('<br>');fb.className='bt-fb '+(ok?'ok':'ng');
  document.getElementById('btLog').textContent='';
  setTimeout(()=>{
    if(enemy.hp<=0){finishBattle(true);return;}
    if(teamState.every(t=>t.hp<=0)){finishBattle(false);return;}
    if(active().hp<=0)activeIdx=teamState.findIndex(t=>t.hp>0);
    renderBattle();renderMoves();
  },1900);
}
// ==== 統一バトルエンジン(プレイヤー/敵 共通) ====
const STATJP={atk:'こうげき',spa:'とくこう',def:'ぼうぎょ',spe:'すばやさ'};
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function clampStage(v){return Math.max(-6,Math.min(6,v));}
function bName(b){return b.c?b.c.name:b.name;}
function rawAtkStat(b,cat){
  if(b.c){var v=formStat(b,cat==='物理'?'atk':'spa');
    if(cat!=='物理'&&b.spaMult&&b.spaMult>1)v=Math.round(v*b.spaMult);
    if(b.id==='c11')v=Math.round(v*1.2);return v;}
  return cat==='物理'?b.atk:(b.spa!=null?b.spa:b.atk);
}
function rawDefStat(b){return b.c?formStat(b,'def'):b.def;}
function rawSpeStat(b){return b.c?formStat(b,'spe'):b.spe;}
function movePriority(att,move){
  if(!move)return 0;
  if(move.pri)return 1;
  if(att.c){
    if(move.cat==='へんか'&&att.id==='c7')return 1;
    if(att.id==='c12'&&move.cat==='へんか'&&((move.target==='self'&&move.stage>0)||(move.target==='enemy'&&move.stage<0)))return 1;
  }
  return 0;
}
function performMove(att,def,move){
  const nm=bName(att);
  // 回復技(先に判定)
  if(move.heal){const h=Math.max(1,Math.round(att.maxhp*move.heal));att.hp=Math.min(att.maxhp,att.hp+h);fxInfo={heal:h,tgtEnemy:!att.c,dmg:0};sfx.buff();return `${nm}の「${move.n}」！ HPが${h}回復した 💚`;}
  // 能力変化技
  if(move.cat==='へんか'){
    const sj=STATJP[move.stat]||move.stat;
    if(move.target==='self'){att.stages[move.stat]=clampStage((att.stages[move.stat]||0)+move.stage);(move.stage>0?sfx.buff:sfx.debuff)();return `${nm}の「${move.n}」！ 自分の${sj}が${move.stage>0?'上がった ▲':'下がった ▼'}`;}
    def.stages[move.stat]=clampStage((def.stages[move.stat]||0)+move.stage);(move.stage<0?sfx.debuff:sfx.buff)();return `${nm}の「${move.n}」！ 相手の${sj}が${move.stage<0?'下がった ▼':'上がった ▲'}`;
  }
  // ダメージ技
  const cat=move.cat;
  const A=eStat(rawAtkStat(att,cat),att.stages[cat==='物理'?'atk':'spa']);
  const D=eStat(rawDefStat(def),def.stages.def);
  let hits=move.hits||1;
  if(att.c&&att.id==='c1'&&!move.hits&&Math.random()<0.25)hits=2; // リボルバー:25%で2回
  if(att.c&&att.id==='c16'&&!move.hits&&cat!=='へんか'&&move.pow<=50)hits=2; // ドスゴリ:威力50以下は2回
  const critRate=move.hicrit?0.30:0.12;
  const defHalve=def.c&&def.id==='c5'&&Math.random()<0.25; // バルーン:被ダメ半減
  let total=0,critAny=false;
  for(let i=0;i<hits;i++){
    let dmg=Math.round(move.pow*(A/(D+40))*(0.9+Math.random()*0.2));
    if(att.c){ if(cat==='物理'&&att.id==='c8')dmg=Math.round(dmg*1.5); if(att.id==='c9'&&att.hp<=att.maxhp/2)dmg=Math.round(dmg*1.2); }
    if(defHalve)dmg=Math.round(dmg/2);
    if(Math.random()<critRate){dmg=Math.round(dmg*1.7);critAny=true;}
    total+=Math.max(1,dmg);
  }
  let endured=false;
  if(def.c&&def.id==='c15'&&def.hp>=def.maxhp&&total>=def.hp){total=def.hp-1;endured=true;}
  def.hp-=total;
  fxInfo={dmg:total,crit:critAny,cat:cat,tgtEnemy:!def.c,heal:0};
  if(critAny)sfx.crit(); else if(att.c)sfx.hit(); else sfx.enemyHit();
  let msg=`${nm}の「${move.n}」！ ${total}ダメージ ⚔️`+(critAny?' きゅうしょ！💥':'')+(hits>1?`（${hits}回ヒット！）`:'');
  if(endured)msg+=` 🌑 ${def.c.name}の「シャドウ」！ 気合で1だけ耐えた！`;
  if(att.c&&att.id==='c9'&&att.hp<=att.maxhp/2)msg+=' 🔥';
  if(move.drain){const g=Math.max(1,Math.round(total*move.drain));att.hp=Math.min(att.maxhp,att.hp+g);msg+=` ${g}吸収🩸`;}
  if(move.recoil){const r=Math.max(1,Math.round(total*move.recoil));att.hp=Math.max(0,att.hp-r);msg+=` 反動${r}💢`;}
  if(move.eff&&Math.random()<(move.eff.chance||1)){const t=move.eff.target==='self'?att:def;t.stages[move.eff.stat]=clampStage((t.stages[move.eff.stat]||0)+move.eff.stage);msg+=` ${move.eff.target==='self'?'自分':'相手'}の${STATJP[move.eff.stat]}が${move.eff.stage>0?'▲':'▼'}`;}
  if(def.c&&def.id==='c4'&&def.hp>0&&Math.random()<0.5){const ref=Math.round(total/2);att.hp=Math.max(0,att.hp-ref);msg+=` ${def.c.name}の反撃${ref}🌀`;}
  return msg;
}
function chooseEnemyMove(enemy,target){
  const moves=enemy.moves||[{n:'たいあたり',cat:'物理',pow:50}];
  const dmg=moves.filter(m=>m.cat!=='へんか'&&!m.heal);
  const heals=moves.filter(m=>m.heal);
  const stat=moves.filter(m=>m.cat==='へんか');
  if(heals.length&&enemy.hp<enemy.maxhp*0.3&&Math.random()<0.5)return rnd(heals);
  if(target.hp<target.maxhp*0.3&&dmg.length)return dmg.reduce((a,b)=>(b.pow||0)>(a.pow||0)?b:a);
  if(stat.length&&Math.random()<0.22){const good=stat.filter(m=>m.target==='self'?((enemy.stages[m.stat]||0)<3):((target.stages[m.stat]||0)>-3));if(good.length)return rnd(good);}
  if(dmg.length){const srt=[...dmg].sort((a,b)=>(b.pow||0)-(a.pow||0));return Math.random()<0.6?srt[0]:rnd(dmg);}
  return moves[0];
}
function finishBattle(win){
  document.getElementById('btPlay').classList.add('hidden');
  document.getElementById('btResult').classList.remove('hidden');
  let reward=win?((enemy&&enemy.boss)?90:(25+cur*12))+(team.includes('c3')?5:0):5;
  if(win)battleWord.learned=true;
  coins+=reward;updateCoins();
  if(win)sfx.win(); else sfx.lose();
  document.getElementById('btrEmoji').textContent=win?'🏆':'💀';
  document.getElementById('btrTitle').textContent=win?'クリア！':'ゲームオーバー';
  document.getElementById('btrMsg').innerHTML=win?`番人「${enemy.name}」をたおした！<b>${battleWord.w}</b> を「覚えた」にしたよ ✓`+((enemy&&enemy.boss)?'<br>👑 ボス撃破ボーナス！':''):'味方が全員たおれた… もう一回！';
  document.getElementById('btrReward').textContent=`＋${reward} 🪙`;
}

document.getElementById('btrClose').onclick=closeBattle;


/* ---- セーブ / 自動保存(localStorage) ---- */
const SAVE_KEY='engvocab_save_v1';
function saveState(){
  try{
    const learned={},wrong={};
    Object.values(DATA).forEach(arr=>arr.forEach(d=>{if(d.learned)learned[d.w]=1;if(d.wrong)wrong[d.w]=1;}));
    localStorage.setItem(SAVE_KEY,JSON.stringify({
      v:1, coins, team, cur, bgmWanted,
      ownedChars:[...ownedChars],
      owned:{bg:[...owned.bg],frame:[...owned.frame],bbg:[...owned.bbg]},
      equipped:{bg:equipped.bg,frame:equipped.frame,bbg:equipped.bbg},
      learned, wrong
    }));
    const el=document.getElementById('saveTag');
    if(el){const t=new Date();const p=n=>String(n).padStart(2,'0');el.textContent='\uD83D\uDCBE 自動保存済み '+p(t.getHours())+':'+p(t.getMinutes())+':'+p(t.getSeconds());}
  }catch(e){}
}
function loadState(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);if(!raw)return false;
    const d=JSON.parse(raw);
    if(typeof d.coins==='number')coins=d.coins;
    if(typeof d.bgmWanted==='boolean')bgmWanted=d.bgmWanted;
    if(Array.isArray(d.ownedChars)){ownedChars.clear();d.ownedChars.forEach(x=>ownedChars.add(x));}
    ownedChars.add('c1');
    if(Array.isArray(d.team)){const t=d.team.filter(id=>ownedChars.has(id));if(t.length)team=t;}
    if(d.owned)['bg','frame','bbg'].forEach(k=>{owned[k].clear();owned[k].add('default');(d.owned[k]||[]).forEach(x=>owned[k].add(x));});
    if(d.equipped)['bg','frame','bbg'].forEach(k=>{if(d.equipped[k])equipped[k]=d.equipped[k];});
    Object.values(DATA).forEach(arr=>arr.forEach(x=>{x.learned=!!(d.learned&&d.learned[x.w]);x.wrong=!!(d.wrong&&d.wrong[x.w]);}));
    if(d.cur&&DATA[d.cur])cur=d.cur;
    return true;
  }catch(e){return false;}
}
